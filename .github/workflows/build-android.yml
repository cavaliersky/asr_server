name: Build Android ARMv7

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_NDK_VERSION: r22b

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            wget \
            unzip \
            cmake \
            ninja-build \
            build-essential \
            python3 \
            pkg-config \
            openjdk-11-jdk \
            protobuf-compiler

      ####################################################################
      # 下载 Android NDK
      ####################################################################

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux-x86_64.zip -O ndk.zip

          unzip -q ndk.zip -d $RUNNER_TEMP

          mv \
            $RUNNER_TEMP/android-ndk-${{ env.ANDROID_NDK_VERSION }} \
            $RUNNER_TEMP/android-ndk

      ####################################################################
      # 编译 sherpa-onnx Android ARMv7
      ####################################################################

      - name: Build sherpa-onnx
        run: |
          git clone --depth 1 \
            https://github.com/k2-fsa/sherpa-onnx.git \
            sherpa-onnx

          cd sherpa-onnx

          export ANDROID_NDK=$RUNNER_TEMP/android-ndk

          export SHERPA_ONNX_ENABLE_C_API=ON
          export BUILD_SHARED_LIBS=ON

          ./build-android-armv7-eabi.sh

          mkdir -p $GITHUB_WORKSPACE/lib

          cp -av \
            build-android-armv7-eabi/install/lib/*.so \
            $GITHUB_WORKSPACE/lib/

          ################################################################
          # 修复 libonnxruntime.so 缺失
          ################################################################

          cd $GITHUB_WORKSPACE/lib

          if [ ! -f libonnxruntime.so ]; then
            REAL_FILE=$(ls libonnxruntime.so.* | head -n 1)
            ln -s "$REAL_FILE" libonnxruntime.so
          fi

      ####################################################################
      # 修补 sherpa-onnx-go
      ####################################################################

      - name: Patch sherpa-onnx-go
        run: |

          ################################################################
          # 底层 Linux binding
          ################################################################

          git clone --depth 1 \
            https://github.com/k2-fsa/sherpa-onnx-go-linux.git \
            $RUNNER_TEMP/sherpa-go-linux

          cd $RUNNER_TEMP/sherpa-go-linux

          rm -rf lib build_*.go

          ################################################################
          # Android build tag
          ################################################################

          cat > build_android.go <<EOF
          //go:build android
          package sherpa_onnx
          import "C"
          EOF

          ################################################################
          # 修复 ARM32 giant array
          ################################################################

          sed -i 's/\(\*\)\(\[1 << 30\]float32\)(unsafe.Pointer(\([^)]*\)))\[:\([^]]*\):\([^]]*\)\]/unsafe.Slice((*float32)(unsafe.Pointer(\3)), \4)/g' sherpa_onnx.go

          sed -i 's/\(\*\)\(\[1 << 30\]_Ctype_float\)(unsafe.Pointer(\([^)]*\)))\[:\([^]]*\):\([^]]*\)\]/unsafe.Slice((*_Ctype_float)(unsafe.Pointer(\3)), \4)/g' sherpa_onnx.go

          ################################################################
          # 顶层 Go binding
          ################################################################

          git clone --depth 1 \
            https://github.com/k2-fsa/sherpa-onnx-go.git \
            $RUNNER_TEMP/sherpa-go

          cd $RUNNER_TEMP/sherpa-go/sherpa_onnx

          cp sherpa_onnx_linux.go sherpa_onnx_android.go

          sed -i 's/go:build .*/go:build android/g' sherpa_onnx_android.go

          sed -i 's/+build .*/+build android/g' sherpa_onnx_android.go

          ################################################################
          # replace
          ################################################################

          cd $GITHUB_WORKSPACE

          go mod edit -replace \
            github.com/k2-fsa/sherpa-onnx-go-linux=$RUNNER_TEMP/sherpa-go-linux

          go mod edit -replace \
            github.com/k2-fsa/sherpa-onnx-go=$RUNNER_TEMP/sherpa-go

          go mod tidy

      ####################################################################
      # 编译 Go Android ARMv7
      ####################################################################

      - name: Build Go binary
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: arm
          GOARM: "7"

        run: |

          export ANDROID_NDK_HOME=$RUNNER_TEMP/android-ndk

          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64

          export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang

          export CXX=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang++

          ################################################################
          # Android so
          ################################################################

          export CGO_CFLAGS="-I$GITHUB_WORKSPACE/lib"

          export CGO_LDFLAGS="\
            -L$GITHUB_WORKSPACE/lib \
            -lonnxruntime \
            -lsherpa-onnx-c-api"

          ################################################################
          # 编译
          ################################################################

          go build \
            -v \
            -trimpath \
            -ldflags="-s -w" \
            -o asr_server \
            main.go

      ####################################################################
      # 上传
      ####################################################################

      - name: Upload
        uses: actions/upload-artifact@v4

        with:
          name: android-armv7

          path: |
            asr_server
            lib/*.so
