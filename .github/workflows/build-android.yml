name: Build Android ARM artifacts

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: r22b

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git python3 python3-pip unzip wget pkg-config openjdk-11-jdk protobuf-compiler

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux-x86_64.zip -O ndk.zip
          unzip -q ndk.zip -d $RUNNER_TEMP
          mv $RUNNER_TEMP/android-ndk-${{ env.ANDROID_NDK_VERSION }} $RUNNER_TEMP/android-ndk

      - name: Build sherpa-onnx for Android
        run: |
          git clone --depth 1 https://github.com/k2-fsa/sherpa-onnx.git third_party/sherpa-onnx
          cd third_party/sherpa-onnx
          
          export ANDROID_NDK=$RUNNER_TEMP/android-ndk
          export SHERPA_ONNX_ENABLE_C_API=ON
          export BUILD_SHARED_LIBS=ON
          
          ./build-android-armv7-eabi.sh
          
          mkdir -p $GITHUB_WORKSPACE/lib
          cp -v build-android-armv7-eabi/install/lib/*.so $GITHUB_WORKSPACE/lib/

      - name: Patch sherpa-onnx-go for Android
        run: |
          # 1. 克隆底层实现库（去除自带的 Linux 二进制库，并写入我们自己的 Android 构建约束）
          git clone --depth 1 https://github.com/k2-fsa/sherpa-onnx-go-linux.git $RUNNER_TEMP/sherpa-go-linux
          cd $RUNNER_TEMP/sherpa-go-linux
          rm -rf lib build_*.go  
          cat <<EOF > build_android.go
          //go:build android
          package sherpa_onnx
          import "C"
          EOF
          
          # 2. 克隆顶层路由库（复制一份供 Android 环境使用的映射文件并修正 Tag）
          git clone --depth 1 https://github.com/k2-fsa/sherpa-onnx-go.git $RUNNER_TEMP/sherpa-go
          cd $RUNNER_TEMP/sherpa-go/sherpa_onnx
          cp sherpa_onnx_linux.go sherpa_onnx_android.go
          sed -i 's/go:build .*/go:build android/g' sherpa_onnx_android.go
          sed -i 's/+build .*/+build android/g' sherpa_onnx_android.go
          
          # 3. 在用户项目内使用 replace 强制覆盖官方库为我们魔改后的本地版本
          cd $GITHUB_WORKSPACE
          go mod edit -replace github.com/k2-fsa/sherpa-onnx-go-linux=$RUNNER_TEMP/sherpa-go-linux
          go mod edit -replace github.com/k2-fsa/sherpa-onnx-go=$RUNNER_TEMP/sherpa-go
          go mod tidy

      - name: Build Go binary for Android
        env:
          CGO_ENABLED: '1'
          GOOS: android
          GOARCH: arm
          GOARM: '7'
        run: |
          export ANDROID_NDK_HOME=$RUNNER_TEMP/android-ndk
          
          # 指定交叉编译工具链并注入之前编译好的 Android C++ 库路径
          export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang"
          export CGO_LDFLAGS="-L$GITHUB_WORKSPACE/lib -Wl,-rpath=\$ORIGIN/lib -lonnxruntime -lsherpa-onnx-c-api"
          
          go build -v -o asr_server main.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-arm-artifacts
          path: |
            asr_server
            lib/*.so
